<mat-card class="pet-card">

  <img
    [src]="pet.imagem"
    [alt]="pet.nome">

  <mat-card-content>

    <h2>{{ pet.nome }}</h2>

    <p>
      {{ pet.raca }}
    </p>

    <span class="tipo">
      {{ pet.tipo }}
    </span>

  </mat-card-content>

  <mat-card-actions>

    <button mat-raised-button color="primary">
      Ver detalhes
    </button>

  </mat-card-actions>

</mat-card>
